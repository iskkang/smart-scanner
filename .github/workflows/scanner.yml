on:
  schedule:
    # 평일 오전 7:00 KST (전일 22:00 UTC) — 전체 스캔
    - cron: '0 22 * * 0-4'
    # 평일 오전 9:00 KST (00:00 UTC) — 포지션 트래킹 + 아침 리포트
    - cron: '0 0 * * 1-5'

  workflow_dispatch:
    inputs:
      command:
        description: '실행 명령'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - portfolio
      add_ticker:
        description: '추가할 종목 (add 시)'
        required: false
      add_price:
        description: '매수가 (add 시)'
        required: false
      remove_ticker:
        description: '제거할 종목 (remove 시)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 포지션 데이터 복원
        env:
          POSITIONS_DATA: ${{ secrets.POSITIONS_DATA }}
        run: |
          mkdir -p data
          if [ -n "$POSITIONS_DATA" ]; then
            echo "$POSITIONS_DATA" > data/positions.json
            echo "포지션 데이터 복원 완료"
          else
            echo "[]" > data/positions.json
            echo "포지션 데이터 없음 — 빈 파일 생성"
          fi

      - name: 스캐너 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          # 스케줄 크론에 따라 명령 결정
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "22" ]; then
              CMD="scan"
            else
              CMD="track"
            fi
          else
            CMD="${{ github.event.inputs.command }}"
          fi

          # add/remove 처리
          if [ -n "${{ github.event.inputs.add_ticker }}" ] && [ -n "${{ github.event.inputs.add_price }}" ]; then
            CMD="add ${{ github.event.inputs.add_ticker }} ${{ github.event.inputs.add_price }}"
          elif [ -n "${{ github.event.inputs.remove_ticker }}" ]; then
            CMD="remove ${{ github.event.inputs.remove_ticker }}"
          fi

          echo "실행 명령: python main.py $CMD"
          python main.py $CMD

      - name: 포지션 데이터 백업
        if: always()
        run: |
          if [ -f data/positions.json ]; then
            echo "포지션 데이터:"
            cat data/positions.json
            echo ""
            echo "⚠️ GitHub Secrets에 POSITIONS_DATA를 수동 업데이트하거나"
            echo "   별도 저장소(gist/S3)를 사용하세요."
          fi

      - name: 스캔 로그 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: data/
          retention-days: 7
