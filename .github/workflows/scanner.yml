name: SMART SCANNER

on:
  schedule:
    # 평일 오전 7:00 KST (전일 22:00 UTC) — 전체 스캔
    - cron: '0 22 * * 0-4'
    # 평일 오전 9:00 KST (00:00 UTC) — 포지션 트래킹
    - cron: '0 0 * * 1-5'

  workflow_dispatch:
    inputs:
      command:
        description: '실행 명령'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - portfolio
          - panic
          - ob
          - add
          - remove
      ticker:
        description: '종목 심볼 (add/remove 시)'
        required: false
      price:
        description: '매수가 (add 시)'
        required: false

jobs:
  # ── Job 1: 전체 스캔 (평일 07:00 KST 자동 + 수동) ────────────
  scan:
    name: 전체 스캔
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'scan')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 포지션 데이터 복원
        env:
          POSITIONS_DATA: ${{ secrets.POSITIONS_DATA }}
        run: |
          mkdir -p data
          if [ -n "$POSITIONS_DATA" ]; then
            echo "$POSITIONS_DATA" > data/positions.json
            echo "포지션 데이터 복원 완료"
          else
            echo "[]" > data/positions.json
            echo "포지션 데이터 없음 — 빈 파일 생성"
          fi

      - name: 전체 스캔 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py scan

      - name: 스캔 결과 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: data/
          retention-days: 7

  # ── Job 2: 포지션 트래킹 (평일 09:00 KST 자동 + 수동) ────────
  track:
    name: 포지션 트래킹
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'track')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 포지션 데이터 복원
        env:
          POSITIONS_DATA: ${{ secrets.POSITIONS_DATA }}
        run: |
          mkdir -p data
          if [ -n "$POSITIONS_DATA" ]; then
            echo "$POSITIONS_DATA" > data/positions.json
            echo "포지션 데이터 복원 완료"
          else
            echo "[]" > data/positions.json
            echo "포지션 데이터 없음 — 빈 파일 생성"
          fi

      - name: 포지션 트래킹 + 아침 리포트
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py track

  # ── Job 3: 수동 명령 (portfolio / panic / add / remove) ───────
  manual:
    name: 수동 명령
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.command != 'scan' &&
      github.event.inputs.command != 'track'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 포지션 데이터 복원
        env:
          POSITIONS_DATA: ${{ secrets.POSITIONS_DATA }}
        run: |
          mkdir -p data
          if [ -n "$POSITIONS_DATA" ]; then
            echo "$POSITIONS_DATA" > data/positions.json
            echo "포지션 데이터 복원 완료"
          else
            echo "[]" > data/positions.json
            echo "포지션 데이터 없음 — 빈 파일 생성"
          fi

      - name: 명령 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          CMD="${{ github.event.inputs.command }}"
          TICKER="${{ github.event.inputs.ticker }}"
          PRICE="${{ github.event.inputs.price }}"

          if [ "$CMD" = "add" ] && [ -n "$TICKER" ] && [ -n "$PRICE" ]; then
            python main.py add $TICKER $PRICE
          elif [ "$CMD" = "remove" ] && [ -n "$TICKER" ]; then
            python main.py remove $TICKER
          else
            python main.py $CMD
          fi

      - name: 결과 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-results-${{ github.run_number }}
          path: data/
          retention-days: 3
