name: SMART SCANNER

on:
  schedule:
    # 07:00 KST (22:00 UTC) 월~금 — 전체 스캔 (정규장 마감 2시간 후, 종가 확정)
    - cron: '0 22 * * 0-4'
    # 01:30 KST (16:30 UTC) 화~토 — 장중 포지션 트래킹 (손절/익절 즉시 알림)
    - cron: '30 16 * * 1-5'
    # 21:30 KST (12:30 UTC) 월~금 — 장전 패닉스캔 (개장 1시간 전, 뉴스 반영)
    - cron: '30 12 * * 1-5'

  workflow_dispatch:
    inputs:
      command:
        description: '실행 명령'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - portfolio
          - panic
      add_ticker:
        description: '추가할 종목 (add 시)'
        required: false
      add_price:
        description: '매수가 (add 시)'
        required: false
      remove_ticker:
        description: '제거할 종목 (remove 시)'
        required: false
      panic_tickers:
        description: '패닉 스캔 특정 종목 (공백 구분, 없으면 전체)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 포지션 데이터 복원
        run: |
          mkdir -p data
          if [ -f data/positions.json ]; then
            echo "포지션 데이터 확인 완료"
          else
            echo "[]" > data/positions.json
            echo "포지션 데이터 없음 — 빈 파일 생성"
          fi

      - name: 스캐너 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "22" ] && [ "$MIN" = "00" ]; then
              CMD="scan"       # 07:00 KST — 전체 스캔
            elif [ "$HOUR" = "16" ] && [ "$MIN" = "30" ]; then
              CMD="track"      # 01:30 KST — 장중 트래킹
            elif [ "$HOUR" = "12" ] && [ "$MIN" = "30" ]; then
              CMD="panic"      # 21:30 KST — 장전 패닉스캔
            else
              CMD="track"      # 폴백
            fi
          else
            CMD="${{ github.event.inputs.command }}"
          fi

          if [ -n "${{ github.event.inputs.add_ticker }}" ] && [ -n "${{ github.event.inputs.add_price }}" ]; then
            CMD="add ${{ github.event.inputs.add_ticker }} ${{ github.event.inputs.add_price }}"
          elif [ -n "${{ github.event.inputs.remove_ticker }}" ]; then
            CMD="remove ${{ github.event.inputs.remove_ticker }}"
          elif [ "$CMD" = "panic" ] && [ -n "${{ github.event.inputs.panic_tickers }}" ]; then
            CMD="panic ${{ github.event.inputs.panic_tickers }}"
          fi

          echo "실행 명령: python main.py $CMD"
          python main.py $CMD

      - name: 포지션 데이터 자동 저장
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/positions.json
          if git diff --staged --quiet; then
            echo "포지션 변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: update positions.json [skip ci]"
            git push
            echo "포지션 데이터 저장 완료"
          fi

      - name: 스캔 로그 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: data/
          retention-days: 7
